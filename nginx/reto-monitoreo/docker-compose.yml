services:

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - lb_network

  backend1:
    build:
      context: ../backend-servers
      dockerfile: Dockerfile
    container_name: backend1
    command: python slow-app.py 8001
    networks:
      - lb_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend2:
    build:
      context: ../backend-servers
      dockerfile: Dockerfile
    container_name: backend2
    command: python slow-app.py 8002
    networks:
      - lb_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend3:
    build:
      context: ../backend-servers
      dockerfile: Dockerfile
    container_name: backend3
    command: python slow-app.py 8003
    networks:
      - lb_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter
    container_name: nginx_exporter
    command:
      - --nginx.scrape-uri=http://nginx/stub_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - lb_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    depends_on:
      - nginx-exporter
    networks:
      - lb_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    depends_on:
      - prometheus
    networks:
      - lb_network
    restart: unless-stopped

volumes:
  nginx_logs:
  prometheus_data:
  grafana_data:

networks:
  lb_network:
    driver: bridge
