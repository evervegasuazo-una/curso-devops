worker_processes 1;

events {
    worker_connections 500;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent '
                        '"upstream: $upstream_addr" "time: $request_time"s';

    access_log /var/log/nginx/access.log detailed;
    error_log  /var/log/nginx/error.log;

    # Round Robin (algoritmo por defecto)
    upstream backend_round_robin {
        server backend1:8001;
        server backend2:8002;
        server backend3:8003;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend_round_robin;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /algorithm {
            return 200 "Algoritmo activo: Round Robin\n";
            add_header Content-Type text/plain;
        }

        # Endpoint de métricas para nginx-prometheus-exporter
        location /stub_status {
            stub_status;
            allow all;
        }
    }
}