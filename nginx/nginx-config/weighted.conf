events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent '
                       '"upstream: $upstream_addr" "time: $request_time"s';
    
    access_log /var/log/nginx/access.log detailed;
    error_log /var/log/nginx/error.log;
    
    # Weighted Round Robin
    upstream backend_weighted {
        server backend1:8001 weight=5;  # 50% del tráfico
        server backend2:8002 weight=3;  # 30% del tráfico
        server backend3:8003 weight=2;  # 20% del tráfico
    }
    
    server {
        listen 80;
        server_name localhost;
        
        location / {
            proxy_pass http://backend_weighted;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        location /algorithm {
            return 200 "Algoritmo activo: Weighted Round Robin (5:3:2)\n";
            add_header Content-Type text/plain;
        }
    }
}