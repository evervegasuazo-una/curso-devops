events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format detailed '$remote_addr [$time_local] "$request" '
                       '$status "upstream: $upstream_addr" '
                       '"response_time: $upstream_response_time"s';
    
    access_log /var/log/nginx/access.log detailed;
    
    # Configuración realista con diferentes capacidades
    upstream backend_mixed {
        # Servidor potente (alta capacidad)
        server backend1:8001 weight=5;
        
        # Servidor medio (capacidad normal)  
        server backend2:8002 weight=3;
        
        # Servidor débil (baja capacidad)
        server backend3:8003 weight=1;
        
        # Configuraciones adicionales
        # max_fails=3 fail_timeout=30s; # Si falla 3 veces, marcar como down por 30s
    }
    
    server {
        listen 80;
        server_name localhost;
        
        location / {
            proxy_pass http://backend_mixed;
            
            # Headers de proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 30s;
        }
        
        location /stats {
            return 200 "Configuración: Weighted (5:3:1) con timeouts\n";
            add_header Content-Type text/plain;
        }
    }
}